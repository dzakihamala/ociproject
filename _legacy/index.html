<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tugas</title>
    <meta name="description" content="Sistem pengumpulan tugas digital untuk guru dan siswa.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="max-width: 380px; margin-top: 48px;">
        <div class="text-center" style="margin-bottom: 24px;">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22c-4-4-8-7.5-8-12a8 8 0 0 1 16 0c0 4.5-4 8-8 12z"/>
                    <path d="M12 10v5"/>
                    <path d="M9.5 12.5L12 10l2.5 2.5"/>
                </svg>
            </div>
            <h1>Sistem Tugas</h1>
            <p style="color: var(--text-3); font-size: 13px; margin-top: 4px;">Kumpulkan tugas dengan mudah 🌱</p>
        </div>

        <!-- Siswa: Masukkan Kode -->
        <div class="card">
            <h2>Kumpulkan Tugas</h2>
            <p style="margin-bottom: 12px;">Masukkan kode 6 digit dari guru Anda.</p>
            <form onsubmit="event.preventDefault(); goToTask();">
                <div class="form-group">
                    <input type="text" id="taskCodeInput" required placeholder="Contoh: 482017" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" style="text-align: center; font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 0.2em; padding: 14px;">
                </div>
                <button type="submit" class="btn">🔍 Cari Tugas</button>
            </form>
        </div>

        <div class="leaf-divider">🌿</div>

        <!-- Guru: Login -->
        <div class="card">
            <h2>Login Guru</h2>
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="email@contoh.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Masukkan password">
                </div>
                <button type="submit" class="btn mt-1" id="btnLogin">Masuk</button>
            </form>
            <p style="margin-top: 14px; font-size: 13px; color: var(--text-3);">Belum memiliki akun? <a href="https://wa.me/6281364254694?text=Halo%20admin%2C%20saya%20ingin%20membuat%20akun.%0ANama%3A%0ASekolah%3A%0APassword%3A" target="_blank" rel="noopener noreferrer" style="color: var(--accent); text-decoration: none; font-weight: 500;">Hubungi admin</a></p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth(false);
        });

        async function goToTask() {
            const code = document.getElementById('taskCodeInput').value.trim();
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                showAlert('Masukkan kode 6 digit yang valid.', 'error');
                return;
            }

            const btn = document.querySelector('#taskCodeInput').closest('form').querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Mencari...';

            try {
                const response = await fetch(`${API_BASE}/api/tasks/code/${code}`);
                let data;
                try {
                    data = await response.json();
                } catch {
                    showAlert('Server mengembalikan respons tidak valid. Coba lagi nanti.', 'error');
                    return;
                }
                if (!response.ok || !data.task) {
                    showAlert('Kode tugas tidak ditemukan. Periksa kembali kode dari guru Anda.', 'error');
                    return;
                }
                window.location.href = `kumpul.html?code=${code}`;
            } catch (e) {
                showAlert('Gagal menghubungi server. Periksa koneksi internet Anda.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Cari Tugas';
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            if (!email) {
                showAlert('Email wajib diisi.', 'error');
                return;
            }
            if (!password) {
                showAlert('Password wajib diisi.', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = "Memproses...";
            
            try {
                await login(email, password);
            } catch (e) {
                if (e.message && e.message.includes('Failed to fetch')) {
                    showAlert('Gagal menghubungi server. Periksa koneksi internet Anda.', 'error');
                } else if (e.message) {
                    showAlert(e.message, 'error');
                } else {
                    showAlert('Terjadi kesalahan saat login. Coba lagi.', 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = "Masuk";
            }
        }
    </script>
</body>
</html>
