<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Manajemen Guru</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap">
    <style>
        :root {
            --bg: #f9f6f0;
            --surface: #fffef9;
            --text: #4a4030;
            --text-2: #8a7a5a;
            --text-3: #a89a7a;
            --border: #e0d8c8;
            --border-2: #cfc5b0;
            --primary: #6b8f5e;
            --accent: #6b8f5e;
            --green-dark: #3b5a30;
            --green-pale: #eef3e8;
            --accent-warm: #c8a96e;
            --error: #c0392b;
            --success: #6b8f5e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', system-ui, sans-serif; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(107,143,94,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(200,169,110,0.05) 0%, transparent 60%);
            color: var(--text);
            line-height: 1.6;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container { max-width: 720px; margin: 0 auto; padding: 20px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px rgba(74, 64, 48, 0.06);
            transition: box-shadow 0.25s ease;
        }
        .card:hover { box-shadow: 0 4px 12px rgba(74, 64, 48, 0.07); }

        h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; color: var(--green-dark); }
        h2 { font-size: 1.05rem; font-weight: 500; margin-bottom: 8px; }
        h3 { font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; }
        p { color: var(--text-2); font-size: 13px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .form-group { margin-bottom: 14px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.02em;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            transition: border-color 0.15s;
            outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(107, 143, 94, 0.12); }
        input::placeholder { color: var(--text-3); }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: var(--primary);
            color: #fff;
            border: 1px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 13px;
            transition: opacity 0.15s, background 0.15s;
            width: 100%;
            text-align: center;
        }
        .btn:hover { background: var(--green-dark); border-color: var(--green-dark); box-shadow: 0 2px 8px rgba(59, 90, 48, 0.2); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); box-shadow: none; }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-inline { width: auto; white-space: nowrap; flex-shrink: 0; }
        .btn-accent { background: var(--accent); border-color: var(--accent); }
        .btn-accent:hover { background: var(--green-dark); border-color: var(--green-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--border-2); color: var(--green-dark); }
        .btn-outline:hover { background: var(--green-pale); }
        .btn-danger { background: var(--error); border-color: var(--error); color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.12s; }
        tbody tr:hover { background: var(--green-pale); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(74, 64, 48, 0.3);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }

        .modal-content {
            background: var(--surface);
            padding: 28px;
            border-radius: 14px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 28px rgba(74, 64, 48, 0.10);
            animation: adminModalIn 0.25s ease-out;
        }

        @keyframes adminModalIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .close-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-3); padding: 2px 6px; border-radius: 6px; transition: background 0.12s; }
        .close-btn:hover { color: var(--text); background: var(--green-pale); }

        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }

        #toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .toast {
            background: var(--surface);
            color: var(--text);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 340px;
            box-shadow: 0 8px 28px rgba(74, 64, 48, 0.10);
            border: 1px solid var(--border);
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--error); }

        .loader {
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.7s linear infinite;
            margin: 32px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 32px; color: var(--text-3); font-size: 13px; }

        .id-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            background: var(--green-pale);
            border: 1px solid var(--border);
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }

        .hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }

        #keyScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #mainScreen { display: none; }

        @media (max-width: 640px) {
            .container { padding: 14px; }
            .card { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- KEY SCREEN -->
<div id="keyScreen">
    <div style="width: 90%; max-width: 360px;">
        <div class="card">
            <h2 style="margin-bottom: 4px;">Admin Panel</h2>
            <p style="margin-bottom: 16px;">Masukkan Setup Key untuk melanjutkan.</p>
            <div class="form-group">
                <label>Setup Key</label>
                <input type="password" id="inputKey" placeholder="••••••••••••"
                    onkeydown="if(event.key==='Enter') enterKey()">
                <p class="hint mt-1">Sama dengan nilai <code>SETUP_KEY</code> di <code>wrangler.toml</code>.</p>
            </div>
            <button onclick="enterKey()" class="btn" id="btnEnterKey">Masuk</button>
        </div>
    </div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen">
    <div class="container">
        <div class="header mt-2">
            <div>
                <h1>🌿 Manajemen Akun Guru</h1>
                <p>Tambah, edit, atau hapus akun guru.</p>
            </div>
            <div style="display:flex;gap:6px;">
                <button onclick="openAddModal()" class="btn btn-accent btn-inline">+ Tambah Guru</button>
                <button onclick="resetKey()" class="btn btn-outline btn-inline">Keluar</button>
            </div>
        </div>

        <div class="card" style="padding: 0;">
            <div id="teacherTableContainer">
                <div class="loader"></div>
            </div>
        </div>
    </div>
</div>

<!-- ADD / EDIT MODAL -->
<div id="teacherModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Tambah Guru</h2>
            <button onclick="closeTeacherModal()" class="close-btn">&times;</button>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="inputEmail" placeholder="email@sekolah.com">
        </div>
        <div class="form-group">
            <label id="labelPassword">Password</label>
            <input type="password" id="inputPassword" placeholder="Minimal 8 karakter">
            <p class="hint mt-1" id="hintPassword"></p>
        </div>
        <div style="display:flex;gap:8px;margin-top:20px;">
            <button onclick="closeTeacherModal()" class="btn btn-outline" style="flex:1;">Batal</button>
            <button onclick="saveTeacher()" class="btn btn-accent" style="flex:1;" id="btnSave">Simpan</button>
        </div>
    </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div id="confirmModal" class="modal">
    <div class="modal-content" style="text-align:center;">
        <h3>Hapus Akun</h3>
        <p class="mt-1">Akun <strong id="deleteEmailLabel"></strong> akan dihapus permanen. Lanjutkan?</p>
        <div style="display:flex;gap:8px;margin-top:20px;">
            <button onclick="closeConfirm()" class="btn btn-outline" style="flex:1;">Batal</button>
            <button onclick="confirmDelete()" class="btn btn-danger" style="flex:1;" id="btnConfirmDelete">Hapus</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
// ==========================================
// CONFIG — ganti jika URL Worker berubah
// ==========================================
const API_BASE = 'https://tugas-worker.dzakihamalafirdaus.workers.dev';

// ==========================================
// STATE
// ==========================================
let ADMIN_KEY = '';
let editingTeacherId = null;
let deletingTeacherId = null;
let teacherList = [];

// ==========================================
// KEY SCREEN
// ==========================================
function enterKey() {
    const key = document.getElementById('inputKey').value.trim();
    if (!key) { showToast('Masukkan Setup Key terlebih dahulu.', 'error'); return; }

    const btn = document.getElementById('btnEnterKey');
    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';

    ADMIN_KEY = key;

    fetchTeachers().then(result => {
        if (result === true) {
            sessionStorage.setItem('admin_key', key);
            document.getElementById('keyScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        } else if (result === 'forbidden') {
            ADMIN_KEY = '';
            showToast('Setup Key salah. Periksa kembali nilai SETUP_KEY di wrangler.toml.', 'error');
        } else {
            ADMIN_KEY = '';
            showToast('Gagal menghubungi server. Periksa koneksi internet dan URL API.', 'error');
        }
    }).finally(() => {
        btn.disabled = false;
        btn.textContent = 'Masuk';
    });
}

function resetKey() {
    sessionStorage.removeItem('admin_key');
    ADMIN_KEY = '';
    document.getElementById('inputKey').value = '';
    document.getElementById('keyScreen').style.display = 'flex';
    document.getElementById('mainScreen').style.display = 'none';
}

// ==========================================
// API HELPER
// ==========================================
async function apiFetch(path, options = {}) {
    const res = await fetch(API_BASE + path, {
        ...options,
        headers: {
            'Content-Type': 'application/json',
            'X-Admin-Key': ADMIN_KEY,
            ...(options.headers || {}),
        },
    });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
}

// ==========================================
// FETCH & RENDER TEACHERS
// ==========================================
async function fetchTeachers() {
    try {
        const { ok, status, data } = await apiFetch('/api/admin/teachers');
        if (!ok) {
            if (status === 403) return 'forbidden';
            return false;
        }
        teacherList = data.teachers || [];
        renderTable();
        return true;
    } catch {
        return false;
    }
}

function renderTable() {
    const container = document.getElementById('teacherTableContainer');

    if (teacherList.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada akun guru. Tekan "+ Tambah Guru" untuk membuat akun pertama.</div>';
        return;
    }

    const rows = teacherList.map(t => `
        <tr>
            <td><span class="id-badge">${esc(t.id.slice(0,8))}…</span></td>
            <td>${esc(t.email)}</td>
            <td style="color:var(--text-3);">${fmtDate(t.created_at)}</td>
            <td>
                <div style="display:flex;gap:6px;">
                    <button data-action="edit" data-id="${esc(t.id)}" data-email="${esc(t.email)}" class="btn btn-outline btn-inline btn-sm">Edit</button>
                    <button data-action="delete" data-id="${esc(t.id)}" data-email="${esc(t.email)}" class="btn btn-danger btn-inline btn-sm">Hapus</button>
                </div>
            </td>
        </tr>
    `).join('');

    container.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th style="width:120px;">ID</th>
                    <th>Email</th>
                    <th style="width:150px;">Dibuat</th>
                    <th style="width:150px;">Aksi</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;

    // Event delegation — aman dari karakter khusus di email (', -, dll)
    container.onclick = function(e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        const email = btn.dataset.email;
        if (action === 'edit') openEditModal(id, email);
        else if (action === 'delete') openDeleteConfirm(id, email);
    };
}

// ==========================================
// ADD MODAL
// ==========================================
function openAddModal() {
    editingTeacherId = null;
    document.getElementById('modalTitle').textContent = 'Tambah Guru';
    document.getElementById('inputEmail').value = '';
    document.getElementById('inputPassword').value = '';
    document.getElementById('inputPassword').placeholder = 'Minimal 8 karakter';
    document.getElementById('labelPassword').textContent = 'Password';
    document.getElementById('hintPassword').textContent = '';
    document.getElementById('teacherModal').classList.add('active');
    setTimeout(() => document.getElementById('inputEmail').focus(), 80);
}

// ==========================================
// EDIT MODAL
// ==========================================
function openEditModal(id, email) {
    editingTeacherId = id;
    document.getElementById('modalTitle').textContent = 'Edit Guru';
    document.getElementById('inputEmail').value = email;
    document.getElementById('inputPassword').value = '';
    document.getElementById('inputPassword').placeholder = 'Kosongkan jika tidak ingin ganti';
    document.getElementById('labelPassword').textContent = 'Password Baru (opsional)';
    document.getElementById('hintPassword').textContent = 'Isi hanya jika ingin mengganti password.';
    document.getElementById('teacherModal').classList.add('active');
    setTimeout(() => document.getElementById('inputEmail').focus(), 80);
}

function closeTeacherModal() {
    document.getElementById('teacherModal').classList.remove('active');
}

// ==========================================
// SAVE (ADD OR EDIT)
// ==========================================
async function saveTeacher() {
    const email = document.getElementById('inputEmail').value.trim();
    const password = document.getElementById('inputPassword').value;
    const btn = document.getElementById('btnSave');

    if (!email) { showToast('Email wajib diisi.', 'error'); return; }
    if (!editingTeacherId && password.length < 8) {
        showToast('Password minimal 8 karakter.', 'error'); return;
    }
    if (editingTeacherId && password && password.length < 8) {
        showToast('Password baru minimal 8 karakter.', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Menyimpan...';

    try {
        let result;
        if (!editingTeacherId) {
            result = await apiFetch('/api/admin/teachers', {
                method: 'POST',
                body: JSON.stringify({ email, password }),
            });
        } else {
            const body = { email };
            if (password) body.password = password;
            result = await apiFetch(`/api/admin/teachers/${editingTeacherId}`, {
                method: 'PUT',
                body: JSON.stringify(body),
            });
        }

        if (result.ok) {
            closeTeacherModal();
            showToast(editingTeacherId ? 'Akun berhasil diperbarui.' : 'Akun guru berhasil dibuat.', 'success');
            await fetchTeachers();
        } else {
            showToast(result.data.error || 'Gagal menyimpan.', 'error');
        }
    } catch (e) {
        showToast('Terjadi kesalahan koneksi.', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Simpan';
    }
}

// ==========================================
// DELETE
// ==========================================
function openDeleteConfirm(id, email) {
    deletingTeacherId = id;
    document.getElementById('deleteEmailLabel').textContent = email;
    document.getElementById('confirmModal').classList.add('active');
}

function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('active');
    deletingTeacherId = null;
}

async function confirmDelete() {
    if (!deletingTeacherId) return;
    const btn = document.getElementById('btnConfirmDelete');
    btn.disabled = true;
    btn.textContent = 'Menghapus...';

    try {
        const result = await apiFetch(`/api/admin/teachers/${deletingTeacherId}`, { method: 'DELETE' });
        if (result.ok) {
            closeConfirm();
            showToast('Akun berhasil dihapus.', 'success');
            await fetchTeachers();
        } else {
            showToast(result.data.error || 'Gagal menghapus.', 'error');
        }
    } catch {
        showToast('Terjadi kesalahan koneksi.', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Hapus';
    }
}

// ==========================================
// UTILS
// ==========================================
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 200);
    }, 3000);
}

function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
}

function fmtDate(iso) {
    if (!iso) return '-';
    try {
        return new Date(iso).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return iso; }
}

// Close on backdrop click
document.getElementById('teacherModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTeacherModal(); });
document.getElementById('confirmModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

// ==========================================
// INIT
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
    const savedKey = sessionStorage.getItem('admin_key');
    if (savedKey) {
        ADMIN_KEY = savedKey;
        fetchTeachers().then(ok => {
            if (ok === true) {
                document.getElementById('keyScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
            } else {
                sessionStorage.removeItem('admin_key');
                ADMIN_KEY = '';
            }
        });
    }
});
</script>
</body>
</html>
