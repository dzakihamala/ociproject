<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kelas - Sistem Tugas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header mt-2">
            <div>
                <h1>🌿 Kelas</h1>
                <p>Kelola kelas dan daftar siswa.</p>
            </div>
        </div>

        <div style="margin-bottom: 16px;">
            <button type="button" id="btnAddClass" class="btn btn-accent btn-inline">Tambah Kelas</button>
        </div>

        <div id="classList" class="task-list">
            <div class="loader"></div>
        </div>
    </div>

    <div id="addClassModal" class="modal" data-teacher-page-modal>
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2 id="classModalTitle">Tambah Kelas</h2>
                <button type="button" onclick="closeModal('addClassModal')" class="close-btn">&times;</button>
            </div>
            <form id="classForm">
                <div class="form-group">
                    <label>Nama Kelas</label>
                    <input type="text" id="classNameInput" required placeholder="Contoh: XII IPA 1">
                </div>
                <button type="submit" class="btn" id="btnSaveClass">Simpan</button>
            </form>
        </div>
    </div>

    <div id="studentModal" class="modal" data-teacher-page-modal>
        <div class="modal-content" style="max-width: 520px;">
            <div class="modal-header" style="align-items: flex-start;">
                <div style="flex: 1; min-width: 0;">
                    <h2 style="margin-bottom: 0;">Siswa</h2>
                    <div id="studentModalClassBlock" class="class-name-inline-wrap" style="display: none;">
                        <div class="class-name-inline-row">
                            <span id="studentModalClassName" class="class-name-display"></span>
                            <input type="text" id="studentModalClassNameInput" class="class-name-input" style="display: none;" autocomplete="off">
                        </div>
                        <div class="class-name-inline-actions">
                            <button type="button" id="btnEditClassName" class="link-edit-nama">edit nama</button>
                            <div id="studentModalClassNameEditActions" class="class-name-edit-btns" style="display: none;">
                                <button type="button" id="btnSaveClassName" class="btn btn-accent btn-inline btn-sm">Simpan</button>
                                <button type="button" id="btnCancelClassName" class="btn btn-outline btn-inline btn-sm">Batal</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" onclick="closeModal('studentModal')" class="close-btn">&times;</button>
            </div>
            <input type="hidden" id="currentClassId" value="">
            <input type="hidden" id="currentClassName" value="">

            <div style="margin-bottom: 16px;">
                <button type="button" onclick="openBulkAdd()" class="btn btn-accent btn-inline btn-sm">Tambah Siswa</button>
            </div>

            <div id="studentList">
                <div class="loader"></div>
            </div>

            <div id="bulkAddArea" style="display:none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
                <div class="form-group">
                    <label>Tambah Siswa (1 nama per baris)</label>
                    <textarea id="bulkNamesInput" rows="6" placeholder="Ahmad Fauzi&#10;Budi Santoso&#10;Citra Dewi"></textarea>
                </div>
                <div style="display:flex; gap:8px;">
                    <button type="button" onclick="handleBulkAdd()" class="btn btn-accent btn-inline btn-sm" id="btnBulkAdd">Simpan</button>
                    <button type="button" onclick="closeBulkAdd()" class="btn btn-outline btn-inline btn-sm">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editStudentModal" class="modal" data-teacher-page-modal>
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Edit Nama Siswa</h2>
                <button type="button" onclick="closeModal('editStudentModal')" class="close-btn">&times;</button>
            </div>
            <form id="editStudentForm">
                <input type="hidden" id="editStudentId" value="">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" id="editStudentName" required>
                </div>
                <button type="submit" class="btn" id="btnEditStudent">Simpan</button>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal" data-teacher-page-modal>
        <div class="modal-content" style="max-width: 360px; text-align: center;">
            <h3 id="confirmTitle">Konfirmasi</h3>
            <p id="confirmMessage" class="mt-1">Apakah Anda yakin?</p>
            <div style="display: flex; gap: 8px; margin-top: 20px;">
                <button type="button" id="btnConfirmCancel" class="btn btn-outline" style="flex: 1;">Batal</button>
                <button type="button" id="btnConfirmOk" class="btn btn-accent" style="flex: 1;">Ya</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authResult = await checkAuth(true);
            if (authResult === '__redirect__') return;
            mountTeacherSidebar('classes');
            await initKelasPage();
        });
    </script>
</body>
</html>
