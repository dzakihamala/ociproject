<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumpulan Tugas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="max-width: 520px; margin-top: 32px;">
        <div style="margin-bottom: 24px;">
            <h1>Pengumpulan Tugas</h1>
            <p>Isi form di bawah untuk mengirim tugas.</p>
        </div>

        <div id="appContent">
            <div class="card" style="border-left: 3px solid var(--accent);">
                <h2 id="taskTitle" style="margin-bottom: 4px;">Memuat...</h2>
                <p id="taskSubject" style="font-weight: 500;"></p>
                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">
                    <p style="white-space: pre-line; margin-bottom: 12px;" id="taskDescription"></p>
                    <div id="taskFileContainer"></div>
                </div>
                <div style="margin-top: 12px; padding: 8px 12px; background: var(--bg); border-radius: 8px;">
                    <p style="color: var(--error); font-size: 13px; font-weight: 500;">
                        Batas Waktu: <span id="taskDeadline">-</span>
                    </p>
                </div>
            </div>

            <div class="card">
                <form id="submitForm">
                    <div class="form-group" id="studentClassGroup">
                        <label>Kelas</label>
                        <input type="text" id="studentClass" required placeholder="Contoh: XII IPA 1">
                    </div>
                    <div class="form-group" id="studentNameGroup">
                        <label>Nama Lengkap</label>
                        <input type="text" id="studentName" required placeholder="Nama lengkap">
                    </div>
                    <div class="form-group" id="mediaInputGroup">
                        <!-- Dynamically rendered by loadStudentTask() based on submission_type -->
                        <label id="mediaLabel">Foto Tugas</label>
                        <div id="mediaPreviewContainer" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;"></div>
                        
                        <input type="file" id="mediaInput" accept="image/*" capture="environment" style="display: none;" onchange="handleMediaCapture(event)">
                        
                        <button type="button" id="mediaCaptureBtn" onclick="document.getElementById('mediaInput').click()" class="btn btn-outline mt-1" style="width: 100%; padding: 14px;">
                            Ambil Foto
                        </button>
                        <p id="mediaHint" style="font-size: 12px; color: var(--text-3); margin-top: 4px; text-align: center;">Tekan untuk memfoto. Klik foto untuk melihat preview.</p>
                    </div>
                    <div class="form-group">
                        <label>Catatan untuk Guru (opsional)</label>
                        <textarea id="studentNote" rows="2" placeholder="Tulis catatan jika ada"></textarea>
                    </div>
                    <button type="submit" class="btn mt-1" id="btnSubmit">Kirim Tugas</button>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        let isSubmitting = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadStudentTask();

            document.getElementById('submitForm').addEventListener('submit', function(e) {
                e.preventDefault();
                if (!isSubmitting) handleSubmit();
            });
        });

        function getStudentIdentityValues() {
            const nameEl = document.getElementById('studentName');
            const classEl = document.getElementById('studentClass');
            let name = (nameEl?.value || '').trim();
            let className = '';
            if (classEl?.tagName === 'SELECT') {
                const opt = classEl.options[classEl.selectedIndex];
                className = (opt?.textContent || classEl.value || '').trim();
            } else {
                className = (classEl?.value || '').trim();
            }
            return { name, className };
        }

        async function handleSubmit() {
            if (isSubmitting) return;
            const { name, className } = getStudentIdentityValues();
            const note = document.getElementById('studentNote').value;

            if (!name) {
                showAlert('Harap pilih atau masukkan nama Anda.', 'error');
                return;
            }
            await refreshStudentRosterIfNeeded();
            if (window.__taskClassRosterFailed) {
                showAlert('Gagal memuat daftar siswa. Pilih kelas lagi atau muat ulang halaman.', 'error');
                return;
            }
            if (!isStudentNameInClassList(name)) {
                showAlert('Nama tidak ada dalam daftar siswa kelas ini. Pilih nama dari daftar yang muncul saat mencari.', 'error');
                return;
            }
            if (!className) {
                showAlert('Harap pilih kelas Anda.', 'error');
                return;
            }
            
            if (capturedMedia.length === 0) {
                const typeLabels = { image: 'foto', video: 'video', audio: 'audio' };
                const label = typeLabels[currentSubmissionType] || 'file';
                showAlert(`Harap ambil minimal 1 ${label} tugas.`, 'error');
                return;
            }

            if (!currentTaskId) {
                showAlert('Tugas tidak ditemukan.', 'error');
                return;
            }

            isSubmitting = true;
            try {
                await submitTask(currentTaskId, name, className, capturedMedia, note, currentSubmissionType);
            } finally {
                isSubmitting = false;
            }
        }
    </script>
</body>
</html>
