<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistem Tugas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header mt-2">
            <div>
                <h1>🌿 Daftar Tugas</h1>
                <p>Kelola tugas siswa Anda.</p>
            </div>
        </div>

        <div id="storageBar" class="storage-bar" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <span style="font-size:12px;font-weight:500;color:var(--text-2);">Penyimpanan</span>
                <span id="storageText" style="font-size:12px;color:var(--text-3);">Memuat...</span>
            </div>
            <div class="storage-track">
                <div id="storageFill" class="storage-fill" style="width:0%;"></div>
            </div>
            <div id="storageWarning" class="storage-warning" style="display:none;"></div>
        </div>

        <div style="margin-bottom: 16px; display:flex; gap:6px; flex-wrap:wrap;">
            <button onclick="openModal('createTaskModal')" class="btn btn-accent btn-inline">Buat Tugas</button>
            <button onclick="handleDownloadAllTasks()" class="btn btn-outline btn-inline">Unduh Semua</button>
            <button onclick="handleDeleteAllTasks()" class="btn btn-outline btn-inline" style="color:var(--error);border-color:var(--error);">Hapus Semua</button>
        </div>

        <div id="taskList" class="task-list">
            <div class="loader"></div>
        </div>
    </div>

    <div id="createTaskModal" class="modal" data-teacher-page-modal>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Buat Tugas Baru</h2>
                <button onclick="closeModal('createTaskModal')" class="close-btn">&times;</button>
            </div>
            <form id="createTaskForm">
                <div class="form-group">
                    <label>Judul</label>
                    <input type="text" id="taskTitleInput" required>
                </div>
                <div class="form-group">
                    <label>Mata Pelajaran</label>
                    <input type="text" id="taskSubjectInput" required>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="text" id="taskDeadlineInput" required placeholder="Pilih tanggal & waktu">
                </div>
                <div class="form-group">
                    <label>Jenis Kiriman Siswa</label>
                    <input type="hidden" id="taskSubmissionType" value="image">
                    <div class="type-picker">
                        <button type="button" class="type-picker-btn active" data-type="image" onclick="selectSubmissionType(this)">📷 Gambar</button>
                        <button type="button" class="type-picker-btn" data-type="video" onclick="selectSubmissionType(this)">🎥 Video</button>
                        <button type="button" class="type-picker-btn" data-type="audio" onclick="selectSubmissionType(this)">🎙️ Audio</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Deskripsi (opsional)</label>
                    <textarea id="taskDescInput" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Lampiran (opsional)</label>
                    <input type="file" id="taskFileInput">
                </div>
                <div class="form-group">
                    <label>Target Kelas (opsional)</label>
                    <div id="classCheckboxes" style="max-height: 160px; overflow-y: auto; padding: 8px; border: 1px solid var(--border); border-radius: 8px;">
                        <span style="font-size:13px; color:var(--text-3);">Memuat...</span>
                    </div>
                    <p style="font-size:12px; color:var(--text-3); margin-top:4px;">Kosongkan jika tugas untuk semua siswa.</p>
                </div>
                <button type="submit" class="btn" id="btnSubmitTask">Buat Tugas</button>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal" data-teacher-page-modal>
        <div class="modal-content" style="max-width: 360px; text-align: center;">
            <h3 id="confirmTitle">Konfirmasi</h3>
            <p id="confirmMessage" class="mt-1">Apakah Anda yakin?</p>
            <div style="display: flex; gap: 8px; margin-top: 20px;">
                <button id="btnConfirmCancel" class="btn btn-outline" style="flex: 1;">Batal</button>
                <button id="btnConfirmOk" class="btn btn-accent" style="flex: 1;">Ya</button>
            </div>
        </div>
    </div>

    <div id="processingOverlay" class="modal" data-teacher-page-modal style="background: rgba(249, 246, 240, 0.92);">
        <div class="text-center">
            <div class="loader" style="width: 32px; height: 32px; border-width: 3px;"></div>
            <h3 class="mt-2">Memproses...</h3>
            <p id="processingText">Mohon tunggu.</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authResult = await checkAuth(true);
            if (authResult === '__redirect__') return;
            mountTeacherSidebar('tasks');
            await initDashboardPage();
        });
    </script>
</body>
</html>
